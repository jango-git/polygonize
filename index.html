<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Polygonize</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='16,2 3,13 16,13' fill='%23ffb347'/><polygon points='16,2 29,13 16,13' fill='%23e8872a'/><polygon points='3,13 29,13 16,30' fill='%23c45200'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <style>
      :root {
        --panel-bg: #1b1d22;
        --panel-fg: #e6e6e6;
        --stage-bg: #0e0f12;
        --accent-h: 0;
        --accent-s: 0%;
        --accent: hsl(var(--accent-h) var(--accent-s) 58%);
        --danger: #d9534f;
        --on-accent: #fff;
        --border-hard: #000;
        --border-mid: #444;
        --border-soft: #333;
        --border-group: #535c6b;
        --border-group-sep: #3a3f47;
        --surface-raised: #2a2d33;
        --surface-deep: #15171b;
        --muted: #9aa0a6;
        --dim: #6a7077;
        --overlay-faint: rgba(255, 255, 255, 0.02);
        --overlay-subtle: rgba(255, 255, 255, 0.04);
        --overlay-thinner: rgba(255, 255, 255, 0.015);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --panel-bg: #ededf0;
          --panel-fg: #18191d;
          --stage-bg: #d4d5db;
          --accent: hsl(var(--accent-h) var(--accent-s) 42%);
          --danger: #c0342f;
          --on-accent: #fff;
          --border-hard: #b0b2b8;
          --border-mid: #9a9da3;
          --border-soft: #c0c2c8;
          --border-group: #757c8a;
          --border-group-sep: #c0c3ca;
          --surface-raised: #dfe0e5;
          --surface-deep: #f8f8fb;
          --muted: #606870;
          --dim: #888f96;
          --overlay-faint: rgba(0, 0, 0, 0.025);
          --overlay-subtle: rgba(0, 0, 0, 0.05);
          --overlay-thinner: rgba(0, 0, 0, 0.015);
        }
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      body {
        display: grid;
        grid-template-columns: 1fr 30%;
        grid-template-rows: auto 1fr;
      }
      #topbar {
        grid-column: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: var(--panel-bg);
        color: var(--panel-fg);
        border-bottom: 1px solid var(--border-hard);
      }
      .topbar-sep {
        width: 1px;
        height: 22px;
        background: var(--border-mid);
        align-self: center;
        flex-shrink: 0;
        margin: 0 4px;
      }
      .panel-button.topbar-load {
        width: auto;
        padding: 8px 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .panel-button.topbar-load svg {
        flex: 0 0 auto;
        display: block;
      }
      .topbar-label {
        display: inline-flex;
        align-items: center;
      }
      .topbar-label svg {
        flex: 0 0 auto;
        display: block;
        color: var(--muted);
      }
      .tooltip {
        position: fixed;
        z-index: 1000;
        max-width: 240px;
        background: color-mix(in srgb, var(--panel-bg) 92%, transparent);
        color: var(--panel-fg);
        border: 1px solid var(--border-soft);
        padding: 7px 9px;
        font-size: 11px;
        line-height: 1.45;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.08s ease;
      }
      .tooltip.visible {
        opacity: 1;
      }
      .tooltip-title {
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.02em;
      }
      .tooltip-desc {
        color: var(--muted);
        margin-top: 2px;
      }
      .topbar-field {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
      }
      .topbar-field input[type="range"] {
        width: 110px;
      }
      .topbar-value {
        font-variant-numeric: tabular-nums;
        color: var(--accent);
        font-weight: 600;
        min-width: 42px;
        text-align: left;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 16px;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        background: var(--border-mid);
        border-radius: 0;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 6px;
        height: 14px;
        margin-top: -5px;
        background: var(--accent);
        border: 0;
        border-radius: 0;
      }
      input[type="range"]::-moz-range-track {
        height: 4px;
        background: var(--border-mid);
        border-radius: 0;
      }
      input[type="range"]::-moz-range-thumb {
        width: 6px;
        height: 14px;
        background: var(--accent);
        border: 0;
        border-radius: 0;
      }
      .topbar-select {
        padding: 6px 8px;
        background: var(--surface-raised);
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 0;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .topbar-select option {
        background: var(--surface-raised);
        color: var(--panel-fg);
        font-weight: 400;
      }
      #app {
        grid-column: 1;
        grid-row: 2;
        display: flex;
        min-height: 0;
      }
      #stage {
        flex: 1 1 auto;
        position: relative;
        background: var(--stage-bg);
        min-width: 0;
      }
      #stage canvas {
        display: block;
      }
      .hotkey-help {
        position: absolute;
        left: 12px;
        bottom: 12px;
        background: color-mix(in srgb, var(--panel-bg) 85%, transparent);
        color: var(--panel-fg);
        border: 1px solid var(--border-soft);
        padding: 8px 10px;
        font-size: 11px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
      }
      .hotkey-help .hk-title {
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }
      .hotkey-help .hk-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hotkey-help kbd {
        display: inline-block;
        width: 33px;
        box-sizing: border-box;
        text-align: center;
        background: var(--surface-raised);
        border: 1px solid var(--border-mid);
        padding: 1px 0;
        font-family: inherit;
        color: var(--accent);
        font-weight: 600;
      }
      .stats-overlay {
        position: absolute;
        right: 12px;
        bottom: 12px;
        background: color-mix(in srgb, var(--panel-bg) 85%, transparent);
        color: var(--panel-fg);
        border: 1px solid var(--border-soft);
        padding: 8px 10px;
        font-size: 11px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
        display: grid;
        grid-template-columns: min-content auto;
        column-gap: 8px;
        align-items: center;
      }
      .stats-overlay .stats-title {
        grid-column: 1 / -1;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }
      .stats-overlay .stats-row {
        display: contents;
      }
      .stats-overlay .stats-value {
        display: block;
        text-align: center;
        background: var(--surface-raised);
        border: 1px solid var(--border-mid);
        padding: 1px 5px;
        font-family: inherit;
        color: var(--accent);
        font-weight: 600;
      }
      #modifiers {
        flex: 0 0 56px;
        background: var(--panel-bg);
        border-left: 1px solid var(--border-hard);
        padding: 8px 6px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }
      .modifier-tool {
        height: 44px;
        background: var(--surface-raised);
        color: var(--panel-fg);
        border: 1px solid var(--border-mid);
        font-size: 11px;
        line-height: 1.1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modifier-tool .tool-icon {
        display: block;
      }
      .modifier-tool:hover {
        border-color: var(--accent);
        color: var(--on-accent);
      }
      .modifier-tool.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--on-accent);
      }
      .tool-divider {
        height: 1px;
        background: var(--border-hard);
        margin: 0 2px;
      }
      #panel {
        grid-column: 2;
        grid-row: 1 / 3;
        background: var(--panel-bg);
        color: var(--panel-fg);
        padding: 16px;
        overflow-y: auto;
        border-left: 1px solid var(--border-hard);
      }
      #panel > *:first-child {
        margin-top: 0;
      }
      .panel-button {
        display: inline-block;
        width: 100%;
        padding: 10px 12px;
        background: var(--accent);
        color: var(--on-accent);
        border: none;
        font-size: 14px;
        cursor: pointer;
      }
      .panel-button:hover {
        filter: brightness(1.1);
      }
      .panel-section {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid var(--border-soft);
        background: var(--overlay-faint);
      }
      .panel-section .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--panel-fg);
        margin: 0 0 4px;
        letter-spacing: 0.02em;
      }
      .panel-section .section-hint {
        font-size: 11px;
        color: var(--muted);
        margin: 0 0 12px;
        line-height: 1.4;
      }
      .field {
        margin-bottom: 12px;
      }
      .field label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 12px;
        color: var(--panel-fg);
        margin-bottom: 4px;
      }
      .field .field-value {
        font-variant-numeric: tabular-nums;
        color: var(--accent);
        font-weight: 600;
      }
      .field input[type="range"] {
        width: 100%;
      }
      .field select {
        width: 100%;
        padding: 6px 8px;
        background: var(--surface-raised);
        color: var(--panel-fg);
        border: 1px solid var(--border-mid);
        border-radius: 0;
        font-size: 13px;
        cursor: pointer;
      }
      .seed-row {
        display: flex;
        gap: 6px;
        align-items: stretch;
      }
      .seed-row .seed-input {
        flex: 1 1 auto;
        min-width: 0;
        padding: 6px 8px;
        background: var(--surface-raised);
        color: var(--panel-fg);
        border: 1px solid var(--border-mid);
        border-radius: 0;
        font-size: 13px;
        font-family: inherit;
        font-variant-numeric: tabular-nums;
        user-select: text;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .seed-row .seed-input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .seed-row .seed-input::-webkit-outer-spin-button,
      .seed-row .seed-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .modifier-card {
        margin-bottom: 6px;
        padding: 6px 8px;
        border: 1px solid var(--border-soft);
        background: var(--overlay-faint);
      }
      .modifier-card.selected {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 8%, transparent);
      }
      .modifier-card .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
        cursor: pointer;
      }
      .modifier-card .card-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--panel-fg);
      }
      .modifier-card .card-remove {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        padding: 0 2px;
      }
      .modifier-card .field {
        margin-bottom: 0;
      }
      .modifier-card .field + .field {
        margin-top: 8px;
      }
      .modifier-card .field label {
        font-size: 11px;
      }
      .path-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }
      .seg {
        display: inline-flex;
      }
      .seg.seg-full {
        display: flex;
        width: 100%;
      }
      .seg.seg-full .icon-toggle {
        flex: 1 1 0;
      }
      .icon-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 26px;
        padding: 0;
        background: var(--surface-raised);
        border: 1px solid var(--border-mid);
        color: var(--panel-fg);
        cursor: pointer;
      }
      .icon-toggle.labeled {
        width: auto;
        gap: 6px;
        padding: 0 10px;
      }
      .icon-toggle svg {
        flex: 0 0 auto;
        display: block;
      }
      .icon-toggle .seg-label {
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
      }
      .icon-toggle:hover {
        border-color: var(--accent);
      }
      .seg .icon-toggle + .icon-toggle {
        margin-left: -1px;
      }
      .icon-toggle.active {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 14%, transparent);
        color: var(--accent);
        position: relative;
        z-index: 1;
      }
      .dropdown-trigger {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        background: var(--surface-raised);
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 0;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      .dropdown-trigger[hidden] {
        display: none;
      }
      .dropdown-trigger:hover,
      .dropdown-trigger.open {
        filter: brightness(1.1);
      }
      .dropdown-trigger .dropdown-trigger-label {
        white-space: nowrap;
      }
      .dropdown-trigger .dropdown-caret {
        flex: 0 0 auto;
        display: block;
        opacity: 0.75;
      }
      .dropdown-pop {
        position: fixed;
        z-index: 1100;
        background: color-mix(in srgb, var(--panel-bg) 96%, transparent);
        border: 1px solid var(--border-soft);
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-height: 60vh;
        overflow-y: auto;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      }
      .dropdown-pop.grid {
        display: grid;
        gap: 2px;
      }
      .dropdown-option {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
        padding: 6px 9px;
        background: none;
        border: 1px solid transparent;
        color: var(--panel-fg);
        font-family: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
      }
      .dropdown-option:hover {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
      }
      .dropdown-option.selected {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 16%, transparent);
        color: var(--accent);
      }
      .dropdown-option .dropdown-option-label {
        font-weight: 600;
      }
      .dropdown-option .dropdown-option-hint {
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .panel-button.subtle {
        background: var(--surface-raised);
        border: 1px solid var(--border-mid);
        color: var(--panel-fg);
        font-size: 13px;
        padding: 8px 12px;
      }
      .panel-button.subtle:hover {
        border-color: var(--accent);
        color: var(--on-accent);
        filter: none;
      }
      .stack-toolbar {
        display: flex;
        gap: 6px;
        margin: 4px 0 10px;
      }
      .panel-button.icon-button {
        width: auto;
        flex: 0 0 auto;
        padding: 7px 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .panel-button.icon-button svg {
        display: block;
      }
      .modifier-stack {
        min-height: 12px;
      }
      .stack-empty {
        margin: 0;
      }
      .card-grip,
      .group-grip {
        cursor: grab;
        color: var(--dim);
        font-size: 12px;
        line-height: 1;
        padding: 0 2px;
        user-select: none;
      }
      .card-grip:hover,
      .group-grip:hover {
        color: var(--accent);
      }
      .modifier-card {
        cursor: grab;
      }
      .modifier-card:active {
        cursor: grabbing;
      }
      .modifier-card .card-head {
        gap: 6px;
        cursor: grab;
      }
      .modifier-card .card-title {
        flex: 1 1 auto;
      }
      .modifier-card.dragging,
      .modifier-group.dragging {
        opacity: 0.4;
      }
      .modifier-group {
        margin-bottom: 6px;
        border: 1px solid var(--border-group);
        background: var(--overlay-thinner);
      }
      .group-head {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 6px;
        background: var(--overlay-subtle);
        border-bottom: 1px solid var(--border-group-sep);
      }
      .group-head.drop-into {
        background: color-mix(in srgb, var(--accent) 18%, transparent);
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }
      .group-caret {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        cursor: pointer;
        padding: 0 1px;
      }
      .group-name {
        flex: 1 1 auto;
        font-size: 12px;
        font-weight: 600;
        color: var(--panel-fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: text;
      }
      .group-name-input {
        flex: 1 1 auto;
        min-width: 0;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        color: var(--panel-fg);
        background: var(--surface-deep);
        border: 1px solid var(--accent);
        border-radius: 0;
        padding: 1px 4px;
      }
      .group-count {
        font-size: 10px;
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        background: var(--surface-raised);
        border: 1px solid var(--border-mid);
        padding: 0 5px;
        min-width: 18px;
        text-align: center;
      }
      .group-mute {
        background: none;
        border: 1px solid var(--border-mid);
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        cursor: pointer;
        padding: 1px 5px;
      }
      .group-mute:hover {
        border-color: var(--accent);
        color: var(--on-accent);
      }
      .group-mute.active {
        color: var(--danger);
        border-color: var(--danger);
      }
      .group-remove {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        padding: 0 2px;
      }
      .group-body {
        padding: 6px 6px 2px;
        min-height: 20px;
      }
      .group-body .modifier-card:last-child {
        margin-bottom: 4px;
      }
      .group-empty {
        margin: 0 0 4px;
        padding: 8px;
        font-size: 11px;
        color: var(--dim);
        text-align: center;
        border: 1px dashed var(--border-group);
      }
      .modifier-group.muted .group-body {
        opacity: 0.45;
      }
      .modifier-group.muted .group-name {
        text-decoration: line-through;
        color: var(--muted);
      }
      .drop-line {
        height: 0;
        margin: 1px 0;
        border-top: 2px solid var(--accent);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="topbar"></div>
    <div id="app">
      <div id="stage"></div>
      <div id="modifiers"></div>
    </div>
    <div id="panel"></div>
    <script type="module" src="dist/bundle.js"></script>
  </body>
</html>
